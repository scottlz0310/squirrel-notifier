name: Reapply Release Notes

# CHANGELOG からリリースノートを再生成する。
# 既定は preview（job summary + artifact）で、apply=true のときだけ公開 release の本文を上書きする。
# リリースページの原稿が崩れた際の復旧手段。

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to (re)generate notes for (e.g., 0.1.3)'
        required: true
        type: string
      apply:
        description: 'true のときだけ公開 release 本文を上書きする（既定は preview のみ）'
        required: false
        type: boolean
        default: false

# 手動入力は run 本文へ直接展開せず env 経由で渡し、利用前に x.y.z 形式を検証する
# （command injection 防止）。
env:
  VERSION: ${{ inputs.version }}
  APPLY: ${{ inputs.apply }}

jobs:
  reapply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Validate inputs
        shell: pwsh
        run: |
          if ($env:VERSION -notmatch '^\d+\.\d+\.\d+$') {
            throw "version は x.y.z 形式で指定してください: '$env:VERSION'"
          }
          Write-Host "version: $env:VERSION / apply: $env:APPLY"

      - name: Compose release notes from CHANGELOG
        shell: pwsh
        run: ./scripts/extract-release-notes.ps1 -Version $env:VERSION

      - name: Publish preview to job summary
        shell: pwsh
        run: |
          "# Release notes preview: v$($env:VERSION) (apply=$($env:APPLY))" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          Get-Content -LiteralPath release-notes.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-notes-${{ inputs.version }}
          path: release-notes.md

      - name: Apply to release
        if: ${{ inputs.apply == true || inputs.apply == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v$($env:VERSION)" --notes-file release-notes.md
          Write-Host "公開 release v$($env:VERSION) の本文を更新しました"
