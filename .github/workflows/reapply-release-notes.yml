name: Reapply Release Notes

# タグを切り直さずに、既存リリースの本文だけを CHANGELOG から再生成して貼り直す。
# リリースページの原稿が崩れた際の復旧手段。

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to reapply notes for (e.g., 0.1.3)'
        required: true
        type: string

jobs:
  reapply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compose release notes from CHANGELOG
        shell: pwsh
        run: ./scripts/extract-release-notes.ps1 -Version "${{ inputs.version }}"

      - name: Update release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "v${{ inputs.version }}" --notes-file release-notes.md
