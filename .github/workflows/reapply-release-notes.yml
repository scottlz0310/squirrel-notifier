name: Reapply Release Notes

# CHANGELOG からリリースノートを再生成する。
# 既定は preview（job summary + artifact）で、apply=true のときだけ公開 release の本文を上書きする。
# リリースページの原稿が崩れた際の復旧手段。

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to (re)generate notes for (e.g., 0.1.3)'
        required: true
        type: string
      apply:
        description: 'true のときだけ公開 release 本文を上書きする（既定は preview のみ）'
        required: false
        type: boolean
        default: false

jobs:
  reapply:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compose release notes from CHANGELOG
        shell: pwsh
        run: ./scripts/extract-release-notes.ps1 -Version "${{ inputs.version }}"

      - name: Publish preview to job summary
        shell: pwsh
        run: |
          "# Release notes preview: v${{ inputs.version }} (apply=${{ inputs.apply }})" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
          "" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          Get-Content -LiteralPath release-notes.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-${{ inputs.version }}
          path: release-notes.md

      - name: Apply to release
        if: ${{ inputs.apply == true || inputs.apply == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ inputs.version }}" --notes-file release-notes.md
          Write-Host "公開 release v${{ inputs.version }} の本文を更新しました"
