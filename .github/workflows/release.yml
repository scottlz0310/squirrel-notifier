name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT_PATH: 'winui3/SquirrelNotifier.WinUI3/SquirrelNotifier.WinUI3.csproj'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    strategy:
      matrix:
        platform: [x64]

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Get version
      id: version
      shell: pwsh
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ github.event.inputs.version }}"
        } else {
          $version = "${{ github.ref_name }}"
        }
        $version = $version -replace '^v', ''
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        echo "Version: $version"

    - name: Install WiX 7
      run: dotnet tool install --global wix --version 7.0.0

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }}

    - name: Build
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          --configuration Release `
          --runtime win-${{ matrix.platform }} `
          --self-contained true `
          --output ./publish/${{ matrix.platform }} `
          /p:Platform=${{ matrix.platform }} `
          /p:Version=${{ steps.version.outputs.VERSION }} `
          /p:PublishSingleFile=false `
          /p:IncludeNativeLibrariesForSelfExtract=true

    - name: Build MSI installer
      id: msi
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $platform = "${{ matrix.platform }}"
        $harvestPath = (Resolve-Path "./publish/$platform").Path
        $msiOutDir = (New-Item -ItemType Directory -Path "./msi/$platform" -Force).FullName
        dotnet build winui3/SquirrelNotifier.Installer/SquirrelNotifier.Installer.wixproj `
          --configuration Release `
          /p:Platform=$platform `
          /p:HarvestPath="$harvestPath" `
          /p:PackageVersion=$version `
          /p:OutputPath="$msiOutDir"
        $msi = Get-ChildItem -Path $msiOutDir -Filter "*.msi" -Recurse | Select-Object -First 1
        if (-not $msi) { throw "MSI ファイルが見つかりませんでした: $msiOutDir" }
        ./scripts/test-msi-major-upgrade.ps1 -MsiPath $msi.FullName
        $msiName = "SquirrelNotifier-Setup-$version-$platform.msi"
        Copy-Item -Path $msi.FullName -Destination "./$msiName"
        echo "MSI_NAME=$msiName" >> $env:GITHUB_OUTPUT
        Write-Host "MSI: $msiName"

    - name: Create installer bundle
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $platform = "${{ matrix.platform }}"
        $bundleDir = Join-Path -Path "." -ChildPath "installer/$platform"
        New-Item -ItemType Directory -Path $bundleDir -Force | Out-Null
        Copy-Item -Path "./publish/$platform/*" -Destination $bundleDir -Recurse -Force
        Copy-Item -Path "scripts/install.ps1","scripts/install.cmd","scripts/uninstall.ps1","scripts/uninstall.cmd","scripts/create-shortcuts.ps1","scripts/create-shortcuts.cmd" -Destination $bundleDir -Force
        $installerArchive = "SquirrelNotifier-Setup-$version-$platform.zip"
        Compress-Archive -Path "$bundleDir/*" -DestinationPath "./$installerArchive" -Force
        echo "INSTALLER_ARCHIVE=$installerArchive" >> $env:GITHUB_OUTPUT
      id: installer

    - name: Generate checksums
      shell: pwsh
      run: |
        $archives = @(
          "${{ steps.installer.outputs.INSTALLER_ARCHIVE }}",
          "${{ steps.msi.outputs.MSI_NAME }}"
        )
        $lines = foreach ($name in $archives) {
          $hash = Get-FileHash -Path "./$name" -Algorithm SHA256
          "$($hash.Hash)  $name"
        }
        $lines | Out-File -FilePath "./checksums-${{ matrix.platform }}.txt" -Encoding ASCII

    - name: Compose release notes from CHANGELOG
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      env:
        VERSION: ${{ steps.version.outputs.VERSION }}
      run: ./scripts/extract-release-notes.ps1 -Version $env:VERSION

    - name: Create Release
      uses: softprops/action-gh-release@v3
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          ${{ steps.installer.outputs.INSTALLER_ARCHIVE }}
          ${{ steps.msi.outputs.MSI_NAME }}
          checksums-${{ matrix.platform }}.txt
        draft: false
        prerelease: false
        body_path: release-notes.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: SquirrelNotifier-${{ matrix.platform }}
        path: |
          ${{ steps.installer.outputs.INSTALLER_ARCHIVE }}
          ${{ steps.msi.outputs.MSI_NAME }}
          checksums-${{ matrix.platform }}.txt
        retention-days: 30
