name: Update v0.1.3 Release Notes

on:
  workflow_dispatch:

jobs:
  update-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit v0.1.3 \
            --title "Squirrel Notifier v0.1.3" \
            --notes-file .github/release-notes-v0.1.3.md
